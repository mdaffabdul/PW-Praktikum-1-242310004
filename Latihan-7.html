<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="npm">NPM: </label>
        <input type="text" id="npm" name="npm"> <br> <br>
        <label for="fname">Full Name: </label>
        <input type="text" id="fname" name="fname"> <br> <br>
        <label for="email">Email: </label>
        <input type="email" id="email" name="email"> <br> <br>
        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass"> <br> <br>
        <label for="pbirth">Place Birth</label>
        <input type="text" id="pbirth" name="pbirth"> <br> <br>
        <label for="bdate">Birthdate</label>
        <input type="date" id="bdate" name="bdate"> <br> <br>
        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label> <br> <br>
        <label for="address">Address: </label>
        <textarea name="address" id="address"></textarea> <br> <br>

        <button type="submit">Save</button>
        <button type="reset">Reset</button>

    </form>
</body>
</html>
